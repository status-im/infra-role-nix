---
nix_user: 'admin'
nix_version: '2.33.1'
nix_package: 'nixVersions.nix_2_33'
#nix_dir: ~
#nix_platform: ~
#nix_tarball_sha: ~
#nix_tar_cmd: ~
nix_url: 'https://nixos.org/releases/nix/nix-{{ nix_version }}'
nix_tarball: 'nix-{{ nix_version }}-{{ nix_arch }}-{{ nix_platform | mandatory }}.tar.xz'
nix_tarball_url: '{{ nix_url }}/{{ nix_tarball }}'
nix_installer_path: /tmp/nix-{{ nix_version }}-{{ nix_arch }}-{{ nix_platform }}
nix_multi_user: true
#nix_multi_install_user: ~
nix_profile_map:
  multi: '/nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh'
  single: '~/.nix-profile/etc/profile.d/nix.sh'
# Because the script that does MacOS multi user install is trash.
nix_first_build_uid: 30000

# Use to force purge nix, useful when installation is broken.
nix_force_purge: false

# Use to force apply nix darwin configuration switch even when config is unchanged.
nix_force_apply: false

nix_experimental_features:
  - flakes
  - nix-command
  - auto-allocate-uids

# Cache
nix_settings:
  'build-users-group': 'nixbld'
  'auto-allocate-uids': 'false'
  'experimental-features': '{{ nix_experimental_features | join(" ") }}'
  'download-buffer-size': '{{ 256 * 1024 * 1024 }}' # 256 MB
  'extra-substituters': 'https://nix-cache.status.im/'
  'extra-trusted-public-keys': 'nix-cache.status.im-1:x/93lOfLU+duPplwMSBR+OlY4+mo+dCN7n0mr4oPwgY='

nix_extra_settings: {}

# Regular Nix store cleanup on a timer
nix_cleanup_timer_enabled: true
nix_cleanup_timer_consul_warning: true
nix_cleanup_timer_name: 'nix-store-cleanup'
nix_cleanup_timer_description: 'Nix Store cleanup'
nix_cleanup_timer_user: 'admin'
nix_cleanup_timer_group: 'admin'
#nix_cleanup_timer_frequency: ~
#nix_cleanup_timer_script_path: ~
nix_cleanup_timer_timeout_sec: 1800 # 30 min
nix_cleanup_delete_older_than: '30d'

# Only used by nix-darwin
nix_pkgs_rev: '98bf8103e311377ca1d648c22f56332756d89bb2' #nixpkgs-25.11-darwin
nix_darwin_rev: 'ebec37af18215214173c98cf6356d0aca24a2585' #nix-darwin-25.11
nix_bin_path: '/run/current-system/sw/bin'
nix_default_packages:
  - jq
  - fzf
  - wget
  - htop
  - silver-searcher
  - coreutils
  - watch
  - tree
  - gnutar
  - unzip
  - mtr
  - zsh-completions
  - zsh-history-substring-search
  - zsh-syntax-highlighting
  - wireguard-tools
  - wireguard-go
  - netdata
  - mtr
  - mtr-exporter
  - chrony
  - xcodes
  - nixVersions.nix_2_32

nix_packages_no_check:
  - chrony

nix_extra_packages: []

nix_packages: '{{ nix_default_packages + nix_extra_packages }}'

nix_homebrew_casks: []
nix_homebrew_taps: []
nix_homebrew_brews: []
